name: burst-events
description: "Ráfaga rápida de eventos para tests de rendimiento"
sequence:
  - delay: 100
    action: zone.open
    target: 1
  - delay: 50
    action: zone.open
    target: 2
  - delay: 50
    action: zone.open
    target: 3
  - delay: 50
    action: zone.open
    target: 4
  - delay: 50
    action: zone.alarm
    target: 1
  - delay: 50
    action: zone.alarm
    target: 2
  - delay: 50
    action: zone.alarm
    target: 3
  - delay: 50
    action: zone.alarm
    target: 4
  - delay: 500
    action: zone.restore
    target: 1
  - delay: 50
    action: zone.restore
    target: 2
  - delay: 50
    action: zone.restore
    target: 3
  - delay: 50
    action: zone.restore
    target: 4
  - delay: 50
    action: zone.close
    target: 1
  - delay: 50
    action: zone.close
    target: 2
  - delay: 50
    action: zone.close
    target: 3
  - delay: 50
    action: zone.close
    target: 4
